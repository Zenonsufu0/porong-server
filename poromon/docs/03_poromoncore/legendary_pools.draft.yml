# legendary_pools.yml — 설계 드래프트 (검증 ID + 초기 가중치)
#
# 출처/근거:
#  - 풀 구성: ../04_game_design/encounter_pool_design.md (결정 018~022, 026)
#  - species ID: ../01_modpack/jar_registry_reference.md §1 (실 jar 검증, cobblemon:<id>)
#  - 스키마: config_structure.md §6.2
#
# 정책 요약:
#  - 가격: 희귀 < 하급(basic) < 중급(intermediate) < 상급(advanced) < 컨셉권(theme) < 최상급(apex)
#  - 환상(mythical) = 이벤트 게이트: 일반 5등급 풀에서는 enabled:false, 컨셉권/이벤트/리그 보상에서만 활성
#  - 컨셉권의 apex 후보는 apex_legendary_ticket_pool 에도 반드시 포함(동기화 — 결정 022)
#  - weight = 풀 내부 상대 추천 가중(높을수록 흔함). 아래 값은 **초기 밸런스(운영 튜닝 대상)**.
#  - enabled:false 사유 주석: (환상=이벤트) / (미구현확인) 등
#  - 종족값/타입 미수정. 표시명은 정식 한글명.
#
# ⚠️ 이 파일은 docs 드래프트다. 실제 런타임 적용은 PoroMonCore(Phase 2) ConfigManager 로드 시.

legendary_pools:

  # ───────────────────────────── 희귀(비전설) ─────────────────────────────
  # 상세 후보/가중은 encounter_pool_design.md §1 + egg_pool 중복정리(#3 작업)에서 확정.
  rare_encounter_pool:
    type: "rare"
    display_name_ko: "희귀 조우권"
    stage_weight: { basic: 70, middle: 20, final: 10 }
