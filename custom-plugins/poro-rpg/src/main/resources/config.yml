debug: true
server-name: "Poro Server"
common:
  sqlite-path: "storage/poro.sqlite"
  seed-path: "seeds"
  timezone: "UTC"
  # HTTP API 바인드 주소. 기본값 127.0.0.1 (루프백 전용).
  # Discord 봇·웹 대시보드가 다른 서버에서 실행되면 "0.0.0.0"으로 변경 후 방화벽 설정 필수.
  api-bind-host: "127.0.0.1"
  # HTTP API Bearer 토큰. 비어 있으면 API가 503을 반환합니다.
  # 반드시 충분히 긴 무작위 문자열로 설정하세요. 예: openssl rand -hex 32
  api-secret-key: ""
  # 시즌 시작 시각 (Unix 초 단위). 0이면 항상 1주차로 계산.
  # 예: date -d "2026-06-01 00:00:00 UTC" +%s → 1748736000
  season-start-epoch: 0

# 상점 아이템 — 키 이름은 자유. 순서 = GUI 표시 순서.
# 지원 필드: material, amount, display-name, price, lore[]
# 카테고리별 섹션 (material/block/cosmetic/special). 1차 시즌: material/block만 활성.
shop:
  material:
    golden-apple:
      material: GOLDEN_APPLE
      amount: 1
      display-name: "§6황금 사과"
      price: 2000
      lore:
        - "§7빠른 체력 회복 & 흡수 효과"
    arrow:
      material: ARROW
      amount: 64
      display-name: "§f화살 ×64"
      price: 400
      lore:
        - "§7석궁 사용자 기본 탄약"
    bread:
      material: BREAD
      amount: 16
      display-name: "§e빵 ×16"
      price: 100
      lore:
