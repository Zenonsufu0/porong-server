# 강화 촉진제 요구량 — 경제 분석 후 확정 예정. /poro reload 로 재적용.
# tier 키 이름은 자유이나 max-level 기준으로 오름차순 정렬됩니다.
# minor/mid/major 는 각각 하급/중급/상급 촉진제 필요 개수.
catalyst-requirements:
  tier1: { max-level:  5, minor:  1, mid:  1, major: 1 }
  tier2: { max-level: 10, minor:  3, mid:  2, major: 1 }
  tier3: { max-level: 15, minor:  6, mid:  4, major: 2 }
  tier4: { max-level: 20, minor: 10, mid:  7, major: 5 }
  tier5: { max-level: 99, minor: 15, mid: 10, major: 7 }

