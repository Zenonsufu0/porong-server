# 필드 5: 고대 성벽 잔해 (ancient_wall)
# 권장 강화: 15강~18강 / 필드 레벨: 5
# ZenonRPG drop hook: ancient_normal_drop / ancient_elite_drop / rift_watcher_drop

Wall_Enderman:
  Type: ENDERMAN
  Display: '&5균열 방랑자'
  Health: 1800
  Damage: 55
  Options:
    MovementSpeed: 0.32
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 140
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll 0.5
  Skills:
  - addScoreboardTag{t=zenon_rpg_field_5} @self ~onSpawn

Wall_Shade:
  Type: WITHER_SKELETON
  Display: '&5성벽 망령'
  Health: 2000
  Damage: 60
  Options:
    MovementSpeed: 0.25
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 150
  AIGoalSelectors:
  - clear
  - meleeattack
  Skills:
  - addScoreboardTag{t=zenon_rpg_field_5} @self ~onSpawn

Wall_SentinelElite:
  Type: WARDEN
  Display: '&5&l균열 봉인병'
  Health: 9000
  Damage: 100
  Options:
    MovementSpeed: 0.22
    PreventOtherDrops: true
    AlwaysShowName: true
    KnockbackResistance: 0.8
    NaturallySpawned: false
  Drops:
  - exp 650
  Skills:
  - addScoreboardTag{t=zenon_rpg_field_5} @self ~onSpawn
  - addScoreboardTag{t=zenon_rpg_rank_elite} @self ~onSpawn
  - skill{s=Wall_SonicBoom} ~onTimer:100
  - potion{type=BLINDNESS;duration=60;level=1} @target ~onAttack 0.3

Rift_Watcher:
  Type: WARDEN
  Display: '&5&l균열 파수꾼'
  Health: 660000
  Damage: 120
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    KnockbackResistance: 1.0
    MovementSpeed: 0.20
    MaxCombatDistance: 40
    NaturallySpawned: false
  Drops:
  - exp 16000
  BossBar:
    Enabled: true
    Title: '&5&l균열 파수꾼'
    Range: 60
    Color: PURPLE
    Style: SEGMENTED_10
  Skills:
  - addScoreboardTag{t=zenon_rpg_field_5} @self ~onSpawn
  - addScoreboardTag{t=zenon_rpg_type_field_boss} @self ~onSpawn
  # 전 페이즈 공통: P-00 기본 공격 (1.8s)
  - skill{s=P_00_BasicAttack} ~onTimer:36
  # Phase 1 (100%~70%): P-01 강타 (4s), P-03 원형 폭발 (11s)
  - skill{s=P_01_FrontStrike} ~onTimer:80 ?hpabove{p=70}
  - skill{s=P_03_CircleBlast} ~onTimer:220 ?hpabove{p=70}
  # Phase 2 (70%~40%): P-01, P-03 유지 + P-05 투사체 (7s), P-07 소환 추가
  - skill{s=P_01_FrontStrike} ~onTimer:80 ?hpbelow{p=70} ?hpabove{p=40}
  - skill{s=P_03_CircleBlast} ~onTimer:180 ?hpbelow{p=70} ?hpabove{p=40}
  - skill{s=P_05_Projectile} ~onTimer:140 ?hpbelow{p=70}
  - skill{s=P_07_SummonCall} ~onTimer:360 ?hpbelow{p=70}
  - summon{type=Wall_Shade;amount=2;duration=600} ~onTimer:360 ?hpbelow{p=70}
  # Phase 3 (40%~0%): 쿨 단축 + P-13 낙하 충격 (18s) + P-09 무적
  - skill{s=P_01_FrontStrike} ~onTimer:60 ?hpbelow{p=40}
  - skill{s=P_03_CircleBlast} ~onTimer:140 ?hpbelow{p=40}
  - skill{s=P_05_Projectile} ~onTimer:100 ?hpbelow{p=40}
  - skill{s=P_07_SummonCall} ~onTimer:300 ?hpbelow{p=40}
  - summon{type=Wall_Shade;amount=3;duration=600} ~onTimer:300 ?hpbelow{p=40}
  - skill{s=P_13_DropImpact} ~onTimer:360 ?hpbelow{p=40}
  # P-08 페이즈 전환 (70%, 40% HP) + P-09 무력화 (40% — 30s 자동 해제)
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:70
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:40
  - skill{s=P_09_Invincible} ~onHealthPercent:40
  # 연출
  - particles{p=DRAGON_BREATH;amount=15;hs=1.2;vs=0.5} @self ~onTimer:15
