# 시즌보스 + 시즌최종보스 MythicMobs 셸
# HP/DEF 기준: docs/04_combat_weapon_skills/season_boss_stats_v1.md §3.4
# 패턴 설계 기준: docs/07_boss_pattern_modules/season_boss_patterns.md
# SP-XX 고유 패턴 메카닉은 PoroRPG 구현 완료 후 연결 예정 (Phase 7+)
# 보스별 DEF는 PoroRPG BossMaster 레지스트리에서 관리 (이 YAML에 없음)

# ============================================================
# 시즌보스 1 — 타락 기사장  (입장 기준: 5일차, 6~10강)
# HP: 150,000 / DEF: 100 / 타이머: 15분
# 공용 패턴: P-00, P-01, P-02, P-03, P-04, P-08, P-09
# 고유 패턴: SP-11 에너지 석판 (전환#1), SP-12 유도 에너지 구체 (전환#2)
# ============================================================
fallen_knight:
  Type: EVOKER
  Display: '&4&l타락 기사장'
  Health: 150000
  Damage: 85
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    KnockbackResistance: 1.0
    MovementSpeed: 0.22
    MaxCombatDistance: 40
    NaturallySpawned: false
  Drops:
  - exp 0
  BossBar:
    Enabled: true
    Title: '&4&l타락 기사장'
    Range: 80
    Color: RED
    Style: SEGMENTED_10
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomlookaround
  Skills:
  # 전 페이즈 공통: P-00 기본 공격 (2.0s)
  - skill{s=P_00_BasicAttack} ~onTimer:40
  # Phase 1 (100%~60%): P-01, P-02
  - skill{s=P_01_FrontStrike} ~onTimer:100 ?hpabove{p=60}
  - skill{s=P_02_LinearDash} ~onTimer:160 ?hpabove{p=60}
  # Phase 2 (60%~30%): P-01, P-02, P-04 추가
  - skill{s=P_01_FrontStrike} ~onTimer:100 ?hpbelow{p=60} ?hpabove{p=30}
  - skill{s=P_02_LinearDash} ~onTimer:160 ?hpbelow{p=60} ?hpabove{p=30}
  - skill{s=P_04_FanSweep} ~onTimer:120 ?hpbelow{p=60}
  # Phase 3 (30%~0%): P-03 원형 폭발 추가 (Phase 2 쿨 단축)
  - skill{s=P_01_FrontStrike} ~onTimer:80 ?hpbelow{p=30}
  - skill{s=P_02_LinearDash} ~onTimer:130 ?hpbelow{p=30}
  - skill{s=P_03_CircleBlast} ~onTimer:220 ?hpbelow{p=30}
  # P-08 페이즈 전환 (60%, 30% HP)
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:60
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:30
  # P-09 무적 진입 — SP-11/SP-12 메카닉으로 해제 (PoroRPG 미구현 구간: 120s 자동 해제)
  # TODO: PoroRPG BossEngineRuntime에서 SP-11/12 처리 후 P_09_DealWindow 강제 실행
  - skill{s=P_09_Invincible} ~onHealthPercent:60
  - skill{s=P_09_Invincible} ~onHealthPercent:30
  - particles{p=SPELL_WITCH;amount=10;hs=0.8;vs=0.3} @self ~onTimer:20

