# 필드 4: 무너진 초소 (ruined_outpost)
# 권장 강화: 12강~16강 / 필드 레벨: 4
# EmpireRPG drop hook: outpost_normal_drop / outpost_elite_drop / fallen_knight_drop

Outpost_Pillager:
  Type: PILLAGER
  Display: '&8타락 약탈자'
  Health: 1200
  Damage: 35
  Options:
    MovementSpeed: 0.25
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 90
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll 0.6
  Skills:
  - addScoreboardTag{t=empire_field_4} @self ~onSpawn

Outpost_Vindicator:
  Type: VINDICATOR
  Display: '&8타락 집행자'
  Health: 1400
  Damage: 42
  Options:
    MovementSpeed: 0.28
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 100
  AIGoalSelectors:
  - clear
  - meleeattack
  Skills:
  - addScoreboardTag{t=empire_field_4} @self ~onSpawn

Outpost_CaptainElite:
  Type: VINDICATOR
  Display: '&c타락 기사 부관'
  Health: 6000
  Damage: 70
  Options:
    MovementSpeed: 0.28
    PreventOtherDrops: true
    AlwaysShowName: true
    KnockbackResistance: 0.6
    NaturallySpawned: false
  Drops:
  - exp 400
  Skills:
  - addScoreboardTag{t=empire_field_4} @self ~onSpawn
  - addScoreboardTag{t=empire_rank_elite} @self ~onSpawn
  - skill{s=Outpost_ShieldBash} ~onTimer:60
  - potion{type=WEAKNESS;duration=100;level=1} @target ~onAttack 0.35

Outpost_Knight:
  Type: EVOKER
  Display: '&4&l초소 기사장'
  Health: 460000
  Damage: 90
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    KnockbackResistance: 1.0
    MovementSpeed: 0.20
    MaxCombatDistance: 40
    NaturallySpawned: false
  Drops:
  - exp 11000
  BossBar:
    Enabled: true
    Title: '&4&l초소 기사장'
    Range: 60
    Color: PURPLE
    Style: SOLID
  Skills:
  - addScoreboardTag{t=empire_field_4} @self ~onSpawn
  - addScoreboardTag{t=empire_type_field_boss} @self ~onSpawn
  # Phase 1·2 공통: P-00 기본 공격 (1.6s), P-02 돌진 (6s), P-06 산개탄 (14s)
  - skill{s=P_00_BasicAttack} ~onTimer:32
  - skill{s=P_02_LinearDash} ~onTimer:120
  - skill{s=P_06_ScatterShot} ~onTimer:280
  # Phase 1 (100%~50%): P-01 강타 (4s), P-04 휩쓸기 (5s)
  - skill{s=P_01_FrontStrike} ~onTimer:80 ?hpabove{p=50}
  - skill{s=P_04_FanSweep} ~onTimer:100 ?hpabove{p=50}
  # Phase 2 (50%~0%): 쿨타임 단축, P-04 연속화 (4s)
  - skill{s=P_01_FrontStrike} ~onTimer:60 ?hpbelow{p=50}
  - skill{s=P_04_FanSweep} ~onTimer:80 ?hpbelow{p=50}
  # P-08 페이즈 전환 (50% HP)
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:50
  - particles{p=VILLAGER_ANGRY;amount=10;hs=0.8;vs=0.4} @self ~onTimer:20
