# 필드 3: 오염된 수로 (corrupted_waterway)
# 권장 강화: 8강~13강 / 필드 레벨: 3
# EmpireRPG drop hook: waterway_normal_drop / waterway_elite_drop / waterway_lord_drop

Waterway_Drowned:
  Type: DROWNED
  Display: '&2오염 익사체'
  Health: 800
  Damage: 25
  Options:
    MovementSpeed: 0.20
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 60
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll 0.5

Waterway_Guardian:
  Type: GUARDIAN
  Display: '&2수로 파수꾼'
  Health: 750
  Damage: 22
  Options:
    MovementSpeed: 0.18
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 55
  AIGoalSelectors:
  - clear
  - meleeattack

Waterway_LurkerElite:
  Type: DROWNED
  Display: '&a오염 군주의 수하'
  Health: 4000
  Damage: 50
  Options:
    MovementSpeed: 0.25
    PreventOtherDrops: true
    AlwaysShowName: true
    KnockbackResistance: 0.5
    NaturallySpawned: false
  Drops:
  - exp 250
  Skills:
  - potion{type=SLOW;duration=80;level=1} @target ~onAttack 0.5
  - skill{s=Waterway_ToxicBurst} ~onTimer:80

Waterway_Lord:
  Type: ELDER_GUARDIAN
  Display: '&a&l수로 군주'
  Health: 310000
  Damage: 70
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    KnockbackResistance: 1.0
    MovementSpeed: 0.16
    MaxCombatDistance: 40
    NaturallySpawned: false
  Drops:
  - exp 7000
  BossBar:
    Enabled: true
    Title: '&a&l수로 군주'
    Range: 60
    Color: GREEN
    Style: SOLID
  Skills:
  # Phase 1·2 공통: P-00 기본 공격 (2.0s), P-02 돌진 (7s), P-04 휩쓸기 (5s)
  - skill{s=P_00_BasicAttack} ~onTimer:40
  - skill{s=P_02_LinearDash} ~onTimer:140
  - skill{s=P_04_FanSweep} ~onTimer:100
  # P-05 투사체 — Phase 1(6s), Phase 2(4s)로 쿨 단축
  - skill{s=P_05_Projectile} ~onTimer:120 ?hpabove{p=40}
  - skill{s=P_05_Projectile} ~onTimer:80 ?hpbelow{p=40}
  # Phase 2 (40%~0%): P-11 추적 독 구체 + P-06 산개탄 추가
  - skill{s=P_11_TrackingOrb} ~onTimer:160 ?hpbelow{p=40}
  - skill{s=P_06_ScatterShot} ~onTimer:300 ?hpbelow{p=40}
  # 독 이펙트 (on attack 30% 확률)
  - potion{type=POISON;duration=100;level=1} @target ~onAttack 0.3
  # P-08 페이즈 전환 (40% HP)
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:40
  - particles{p=WATER_SPLASH;amount=20;hs=1;vs=0.3} @self ~onTimer:15
