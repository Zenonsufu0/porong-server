# 필드 1: 수도 외곽 평원 (capital_plains)
# 권장 강화: 0강~5강 / 필드 레벨: 1
# EmpireRPG drop hook: plains_normal_drop / plains_elite_drop / plains_predator_drop

Plains_Soldier:
  Type: ZOMBIE
  Display: '&7왕국 수비병'
  Health: 300
  Damage: 12
  Options:
    MovementSpeed: 0.23
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 20
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll 0.7
  - randomlookaround

Plains_Wildling:
  Type: SKELETON
  Display: '&7들판 야수'
  Health: 250
  Damage: 10
  Options:
    MovementSpeed: 0.28
    PreventOtherDrops: true
    AlwaysShowName: false
    NaturallySpawned: false
  Drops:
  - exp 18
  AIGoalSelectors:
  - clear
  - meleeattack
  - randomstroll 0.7

Plains_StalkerElite:
  Type: ZOMBIE
  Display: '&c들판의 노식자'
  Health: 1500
  Damage: 24
  Options:
    MovementSpeed: 0.30
    PreventOtherDrops: true
    AlwaysShowName: true
    KnockbackResistance: 0.3
    NaturallySpawned: false
  Drops:
  - exp 80
  Skills:
  - skill{s=Plains_StalkerCharge} ~onTimer:80

Plains_Predator:
  Type: GIANT
  Display: '&4&l들판 포식자'
  Health: 100000
  Damage: 35
  Options:
    AlwaysShowName: true
    PreventOtherDrops: true
    KnockbackResistance: 1.0
    MovementSpeed: 0.22
    MaxCombatDistance: 40
    NaturallySpawned: false
  Drops:
  - exp 2000
  BossBar:
    Enabled: true
    Title: '&4&l들판 포식자'
    Range: 60
    Color: RED
    Style: SOLID
  Skills:
  # Phase 1·2 공통: P-00 기본 공격 (2.0s)
  - skill{s=P_00_BasicAttack} ~onTimer:40
  # Phase 1 (100%~50%): P-01 전방 강타 (5s), P-02 직선 돌진 (8s), P-04 부채꼴 휩쓸기 (6s)
  - skill{s=P_01_FrontStrike} ~onTimer:100 ?hpabove{p=50}
  - skill{s=P_02_LinearDash} ~onTimer:160
  - skill{s=P_04_FanSweep} ~onTimer:120 ?hpabove{p=50}
  # Phase 2 (50%~0%): 쿨타임 단축 + P-03 분노 폭발 추가
  - skill{s=P_01_FrontStrike} ~onTimer:80 ?hpbelow{p=50}
  - skill{s=P_04_FanSweep} ~onTimer:100 ?hpbelow{p=50}
  - skill{s=P_03_CircleBlast} ~onTimer:200 ?hpbelow{p=50}
  # P-08 페이즈 전환 (50% HP)
  - skill{s=P_08_PhaseTransition} ~onHealthPercent:50
  # Phase 2 분노 연출
  - particles{p=CRIT;amount=30;hs=1;vs=0.5} @self ~onTimer:20 ?hpbelow{p=50}
