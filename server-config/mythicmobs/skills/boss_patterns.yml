# 공용 보스 패턴 모듈 P-00 ~ P-13 (P-10 폐기 — DL-048)
# 필드보스·시즌보스가 공유하는 기본 구현체
# 보스별 파라미터 오버라이드가 필요한 경우 해당 보스 YAML 또는 field_skills.yml에 별도 정의
# 참조: docs/07_boss_pattern_modules/common_patterns.md

# P-00 기본 공격 — 쿨 1.8s(36틱), 범위 2.5블럭, 피해 60%
P_00_BasicAttack:
  Skills:
  - aoe{r=2.5} @EntitiesInRadius{r=2.5,mobs=false} =mdamage{a=0.6}
  - particles{p=CRIT;amount=4;hs=0.4;vs=0.2} @self

# P-01 전방 강타 — 예비 모션 0.8s(16틱) 후 강타, 범위 3블럭, 피해 120%, 넉백 1.5
P_01_FrontStrike:
  Skills:
  - particles{p=CRIT_MAGIC;amount=10;hs=0.8;vs=0.3} @self
  - sound{s=entity.iron_golem.attack;v=0.7;p=1.2} @self
  - delay 16
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =mdamage{a=1.2}
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =thrust{v=1.5;y=0.3}
  - particles{p=EXPLOSION_NORMAL;amount=8;hs=1;vs=0.4} @self
  - sound{s=entity.iron_golem.attack;v=1;p=0.7} @self

# P-02 직선 돌진 — 예고 파티클 1.5s(30틱) 후 고속 돌진, 피해 150%, 경로 2블럭
P_02_LinearDash:
  Skills:
  - particles{p=FLAME;amount=15;hs=0.3;vs=0.5} @self
  - sound{s=entity.ravager.roar;v=0.8;p=1.1} @self
  - delay 30
  - thrust{v=5;y=0} @self
  - aoe{r=2} @EntitiesInRadius{r=2,mobs=false} =mdamage{a=1.5}
  - aoe{r=2} @EntitiesInRadius{r=2,mobs=false} =thrust{v=2;y=0.5}
  - particles{p=SWEEP_ATTACK;amount=20;hs=2;vs=0.3} @self
  - sound{s=entity.zombie.break_wooden_door;v=1;p=1.5} @self

# P-03 원형 폭발 — 예고 파티클 1.2s(24틱) 후 반지름 5블럭 폭발, 피해 130%
P_03_CircleBlast:
  Skills:
  - particles{p=FIREWORKS_SPARK;amount=60;hs=4;vs=0.3} @self
  - sound{s=entity.generic.explode;v=0.6;p=1.3} @self
  - delay 24
  - aoe{r=5} @EntitiesInRadius{r=5,mobs=false} =mdamage{a=1.3}
  - aoe{r=5} @EntitiesInRadius{r=5,mobs=false} =thrust{v=1;y=0.5}
  - particles{p=EXPLOSION_LARGE;amount=8;hs=3;vs=1.5} @self
  - sound{s=entity.generic.explode;v=1.5;p=0.7} @self

# P-04 부채꼴 휩쓸기 — 예비 동작 1.0s(20틱) 후 전방 반지름 4블럭 범위 휩쓸기, 피해 110%
# (MM 무료버전 콘 타게터 미지원으로 원형 AoE 대체, 범위 축소로 근사치 구현)
P_04_FanSweep:
  Skills:
  - particles{p=SWEEP_ATTACK;amount=8;hs=1.5;vs=0.3} @self
  - delay 20
  - aoe{r=4} @EntitiesInRadius{r=4,mobs=false} =mdamage{a=1.1}
  - aoe{r=4} @EntitiesInRadius{r=4,mobs=false} =thrust{v=1;y=0.3}
  - particles{p=CRIT;amount=20;hs=2;vs=0.5} @self
  - sound{s=entity.player.attack.sweep;v=1.5;p=0.7} @self

# P-05 투사체 발사 — 발사 모션 0.6s(12틱) 후 투사체, 속도 12, 피해 100%
P_05_Projectile:
  Skills:
  - particles{p=CRIT;amount=5;hs=0.3;vs=0.3} @self
  - delay 12
  - projectile{v=12;ot=0;hte=P_05_Hit} @target
  - sound{s=entity.arrow.shoot;v=1;p=0.9} @self

P_05_Hit:
  Skills:
  - mdamage{a=1.0} @trigger
  - particles{p=CRIT_MAGIC;amount=8;hs=0.4;vs=0.3} @self

# P-06 산개탄 — 집결 파티클 1.5s(30틱) 후 6발 산탄, 착탄 피해 120%
P_06_ScatterShot:
  Skills:
  - particles{p=SPELL_WITCH;amount=30;hs=2;vs=2} @self
  - sound{s=entity.wither.shoot;v=0.8;p=1.3} @self
  - delay 30
  - shoot{type=arrow;v=2;amount=6;spread=25} @target
  - sound{s=entity.wither.shoot;v=1.5;p=0.9} @self

# P-07 소환체 호출 — 소환 원진 파티클 2.0s(40틱) 후 소환 알림
# 실제 summon 호출은 보스 YAML에서 수행 (보스별 소환체 타입이 다름)
P_07_SummonCall:
  Skills:
  - particles{p=PORTAL;amount=40;hs=2.5;vs=1} @self
  - sound{s=entity.enderman.teleport;v=1.5;p=0.6} @self
  - delay 40
  - speak{m="&4[보스] 소환체가 출현합니다!"} @PlayersInRadius{r=60}
  - sound{s=entity.elder_guardian.curse;v=1;p=0.8} @self

# P-08 페이즈 전환 — HP% 도달 즉시 발동, 연출+알림
P_08_PhaseTransition:
  Skills:
  - potion{type=DAMAGE_RESISTANCE;duration=40;level=4} @self
  - particles{p=EXPLOSION_HUGE;amount=8;hs=4;vs=2} @self
  - particles{p=SMOKE_LARGE;amount=60;hs=3;vs=3} @self
  - sound{s=entity.ender_dragon.growl;v=2;p=0.7} @self
  - speak{m="&c[보스] 분노 페이즈로 전환합니다!"} @PlayersInRadius{r=60}

# P-09 무력화 진입 — 30s(600틱) 무적 + 알림
# 필드보스용: 30s 후 자동 해제 (DAMAGE_RESISTANCE 만료), 시즌보스는 SP-XX 메카닉으로 해제
P_09_Invincible:
  Skills:
  - potion{type=DAMAGE_RESISTANCE;duration=600;level=5} @self
  - particles{p=BARRIER;amount=30;hs=3;vs=2} @self
  - sound{s=entity.wither.spawn;v=1.5;p=1} @self
  - speak{m="&5[보스] 봉인 장벽 발동! 해제 조건을 달성하세요!"} @PlayersInRadius{r=60}

# P-09 딜타임 개방 — 무적 해제 + 기절 + 취약 창 알림
# 필드보스: DAMAGE_RESISTANCE 만료(30s 후) 후 보스 일반 상태 복귀
# 시즌보스: EmpireRPG가 조건 달성 시 이 스킬 강제 실행
P_09_DealWindow:
  Skills:
  - removepotion{type=DAMAGE_RESISTANCE} @self
  - potion{type=SLOW;duration=60;level=5} @self
  - particles{p=CRIT_MAGIC;amount=60;hs=5;vs=3} @self
  - sound{s=entity.lightning_bolt.thunder;v=2;p=1} @self
  - speak{m="&a[보스] 봉인 해제! 딜타임입니다!"} @PlayersInRadius{r=60}

# P-11 추적 구체 — 예고 0.8s(16틱) 후 유도 투사체, 추적속도 4블럭/s, 피해 140%
P_11_TrackingOrb:
  Skills:
  - particles{p=END_ROD;amount=8;hs=0.5;vs=0.5} @target
  - sound{s=entity.blaze.shoot;v=0.8;p=0.6} @self
  - delay 16
  - projectile{v=4;ot=0;hte=P_11_Hit;h=true;hti=4} @target
  - sound{s=entity.blaze.ambient;v=1;p=0.5} @self

P_11_Hit:
  Skills:
  - mdamage{a=1.4} @trigger
  - particles{p=END_ROD;amount=20;hs=1;vs=0.5} @self
  - sound{s=entity.blaze.hurt;v=1;p=0.8} @self

# P-12 연속 타격 — 예비 동작 0.5s(10틱) 후 3연타, 타당 60%, 마지막 타 넉백
P_12_ComboStrike:
  Skills:
  - particles{p=CRIT;amount=5;hs=0.5;vs=0.2} @self
  - delay 10
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =mdamage{a=0.6}
  - particles{p=CRIT;amount=4;hs=0.4;vs=0.2} @self
  - delay 8
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =mdamage{a=0.6}
  - particles{p=CRIT;amount=4;hs=0.4;vs=0.2} @self
  - delay 8
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =mdamage{a=0.6}
  - aoe{r=3} @EntitiesInRadius{r=3,mobs=false} =thrust{v=2;y=0.5}
  - particles{p=CRIT_MAGIC;amount=12;hs=1;vs=0.5} @self
  - sound{s=entity.player.attack.crit;v=1;p=0.9} @self

# P-13 낙하 충격 — 낙하 지점 파티클 예고 1.5s(30틱) 후 도약+착지 충격, 반지름 5블럭, 피해 160%
P_13_DropImpact:
  Skills:
  - particles{p=FIREWORKS_SPARK;amount=40;hs=3;vs=0.5} @target
  - sound{s=entity.generic.explode;v=0.5;p=1.5} @self
  - delay 30
  - thrust{v=0;y=3} @self
  - delay 15
  - aoe{r=5} @EntitiesInRadius{r=5,mobs=false} =mdamage{a=1.6}
  - aoe{r=5} @EntitiesInRadius{r=5,mobs=false} =thrust{v=2;y=1}
  - particles{p=EXPLOSION_LARGE;amount=15;hs=3;vs=1} @self
  - sound{s=entity.generic.explode;v=2;p=0.6} @self
