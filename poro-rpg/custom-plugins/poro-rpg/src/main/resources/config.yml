debug: true
server-name: "Poro Server"
common:
  sqlite-path: "storage/poro.sqlite"
  seed-path: "seeds"
  timezone: "UTC"
  # HTTP API 바인드 주소. 기본값 127.0.0.1 (루프백 전용).
  # Discord 봇·웹 대시보드가 다른 서버에서 실행되면 "0.0.0.0"으로 변경 후 방화벽 설정 필수.
  api-bind-host: "127.0.0.1"
  # HTTP API Bearer 토큰. 비어 있으면 API가 503을 반환합니다.
  # 반드시 충분히 긴 무작위 문자열로 설정하세요. 예: openssl rand -hex 32
  api-secret-key: ""
  # 시즌 시작 시각 (Unix 초 단위). 0이면 항상 1주차로 계산.
  # 예: date -d "2026-06-01 00:00:00 UTC" +%s → 1748736000
  season-start-epoch: 0

# 상점 아이템 — 키 이름은 자유. 순서 = GUI 표시 순서.
# 지원 필드: material, amount, display-name, price, lore[]
# 카테고리별 섹션 (material/block/cosmetic/special). 1차 시즌: material/block만 활성.
shop:
  material:
    # ── 씨앗 (구매: 좌클릭 1개 / 우클릭 64개) ──
    wheat-seeds:    { material: WHEAT_SEEDS,    amount: 1, price: 10, display-name: "§f밀 씨앗" }
    beetroot-seeds: { material: BEETROOT_SEEDS, amount: 1, price: 20, display-name: "§f비트 씨앗" }
    melon-seeds:    { material: MELON_SEEDS,    amount: 1, price: 30, display-name: "§f수박 씨앗" }
    pumpkin-seeds:  { material: PUMPKIN_SEEDS,  amount: 1, price: 30, display-name: "§f호박 씨앗" }
    # ── 감자·당근: 씨앗=작물 동일 아이템 → 구매(좌1/우64) + set(64) 판매 겸용 ──
    potato: { material: POTATO, amount: 1, price: 15, sell-price: 25, sell-mode: set, display-name: "§f감자" }
    carrot: { material: CARROT, amount: 1, price: 15, sell-price: 25, sell-mode: set, display-name: "§f당근" }
    # ── 농작물 (set 64 판매전용) ──
    wheat:       { material: WHEAT,       sell-price: 25, sell-mode: set, buyable: false, display-name: "§f밀" }
    melon-slice: { material: MELON_SLICE, sell-price: 20, sell-mode: set, buyable: false, display-name: "§f수박" }
    pumpkin:     { material: PUMPKIN,     sell-price: 20, sell-mode: set, buyable: false, display-name: "§f호박" }
    # ── 광물 (낱개 좌1 / set 우64 판매전용) ──
    coal:        { material: COAL,         sell-price: 2,  buyable: false, display-name: "§f석탄" }
    copper:      { material: COPPER_INGOT, sell-price: 3,  buyable: false, display-name: "§f구리 주괴" }
    redstone:    { material: REDSTONE,     sell-price: 4,  buyable: false, display-name: "§f레드스톤" }
    iron:        { material: IRON_INGOT,   sell-price: 5,  buyable: false, display-name: "§f철 주괴" }
    lapis:       { material: LAPIS_LAZULI, sell-price: 6,  buyable: false, display-name: "§f청금석" }
    gold:        { material: GOLD_INGOT,   sell-price: 10, buyable: false, display-name: "§f금 주괴" }
    diamond:     { material: DIAMOND,      sell-price: 18, buyable: false, display-name: "§b다이아몬드" }
    emerald:     { material: EMERALD,      sell-price: 22, buyable: false, display-name: "§a에메랄드" }
    # ── 전장의 파편 (재화 → 골드 환전, 낱개) ──
    battle-shard: { material: PRISMARINE_SHARD, sell-price: 3, currency: mat_battle_shard, buyable: false, display-name: "§b전장의 파편" }
  # 블럭 탭 — gui_shop.md §7 블럭 상점 표 (목재 8종 + 기본 석재 6종 1차 등록)
  block:
    oak-planks:
      material: OAK_PLANKS
      amount: 64
      display-name: "§f참나무 판자 ×64"
      price: 320
    spruce-planks:
      material: SPRUCE_PLANKS
      amount: 64
